name: hermes_oracle_demo_build

on:
  workflow_dispatch:
    inputs:
      variant:
        description: Build variant
        required: true
        default: debug
        type: choice
        options:
          - debug

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        shell: bash
        working-directory: bridge/shizuku-oracle-app

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3.2.2

      - name: Install required Android packages
        run: |
          set -Eeuo pipefail
          yes | sdkmanager --licenses >/dev/null
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: Verify patched provider contract
        run: |
          set -Eeuo pipefail
          test -f app/src/main/AndroidManifest.xml
          grep -q 'rikka.shizuku.ShizukuProvider' app/src/main/AndroidManifest.xml
          grep -q 'android:multiprocess="false"' app/src/main/AndroidManifest.xml

      - name: Write local.properties
        run: |
          set -Eeuo pipefail
          printf 'sdk.dir=%s\n' "$ANDROID_SDK_ROOT" > local.properties

      - name: Build debug APK
        run: |
          set -Eeuo pipefail
          chmod +x ./gradlew
          ./gradlew --no-daemon :app:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v6
        with:
          name: hermes-oracle-debug-apk
          path: bridge/shizuku-oracle-app/app/build/outputs/apk/**/*.apk
          if-no-files-found: error
