name: hermes_oracle_demo_build

on:
  workflow_dispatch:
    inputs:
      variant:
        description: Build variant
        required: true
        default: debug
        type: choice
        options:
          - debug

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        shell: bash
        working-directory: bridge/shizuku-oracle-app

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3.2.2

      - name: Resolve sdkmanager
        run: |
          set -Eeuo pipefail
          SDK_CANDIDATES=(
            "${ANDROID_SDK_ROOT:-}/cmdline-tools/latest/bin/sdkmanager"
            "${ANDROID_SDK_ROOT:-}/cmdline-tools/bin/sdkmanager"
            "/usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager"
          )
          SDKMANAGER=""
          for c in "${SDK_CANDIDATES[@]}"; do
            if [ -n "$c" ] && [ -x "$c" ]; then
              SDKMANAGER="$c"
              break
            fi
          done
          if [ -z "$SDKMANAGER" ]; then
            SDKMANAGER="$(command -v sdkmanager || true)"
          fi
          test -n "$SDKMANAGER"
          test -x "$SDKMANAGER"
          printf 'SDKMANAGER=%s\n' "$SDKMANAGER" | tee -a "$GITHUB_ENV"

      - name: Install required Android packages
        run: |
          set -Eeuo pipefail
          yes | "$SDKMANAGER" --licenses >/dev/null || true
          "$SDKMANAGER" --install \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: Verify source manifest contract
        run: |
          set -Eeuo pipefail
          test -f app/src/main/AndroidManifest.xml
          grep -q 'rikka.shizuku.ShizukuProvider' app/src/main/AndroidManifest.xml
          grep -q 'android:multiprocess="false"' app/src/main/AndroidManifest.xml
          grep -q 'tools:node="replace"' app/src/main/AndroidManifest.xml

      - name: Write local.properties
        run: |
          set -Eeuo pipefail
          printf 'sdk.dir=%s\n' "$ANDROID_SDK_ROOT" > local.properties

      - name: Build debug APK
        run: |
          set -Eeuo pipefail
          chmod +x ./gradlew
          ./gradlew --no-daemon :app:assembleDebug

      - name: Merged manifest truth gate
        run: |
          set -Eeuo pipefail
          MF="$(find app/build/intermediates -type f \
            \( -path '*/merged_manifests/*/AndroidManifest.xml' \
            -o -path '*/merged_manifest/*/AndroidManifest.xml' \
            -o -path '*/packaged_manifests/*/AndroidManifest.xml' \) \
            | sort | tail -n 1)"
          test -n "$MF"
          test -f "$MF"
          printf 'MERGED_MANIFEST=%s\n' "$MF" | tee -a "$GITHUB_ENV"
          grep -q 'rikka.shizuku.ShizukuProvider' "$MF"
          grep -q 'android:multiprocess="false"' "$MF"
          ! grep -A6 -B2 'rikka.shizuku.ShizukuProvider' "$MF" | grep -q 'android:multiprocess="true"'

      - name: Upload merged manifest
        uses: actions/upload-artifact@v6
        with:
          name: hermes-oracle-merged-manifest
          path: ${{ env.MERGED_MANIFEST }}
          if-no-files-found: error

      - name: Upload APK
        uses: actions/upload-artifact@v6
        with:
          name: hermes-oracle-debug-apk
          path: bridge/shizuku-oracle-app/app/build/outputs/apk/**/*.apk
          if-no-files-found: error
