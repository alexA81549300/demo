name: hermes_oracle_demo_build

on:
  workflow_dispatch:
    inputs:
      variant:
        description: Build variant
        required: true
        default: debug
        type: choice
        options:
          - debug

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        shell: bash
        working-directory: bridge/shizuku-oracle-app

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3.2.2

      - name: Resolve sdkmanager and tools
        run: |
          set -Eeuo pipefail

          SDKMANAGER=""
          APKANALYZER=""
          AAPT2=""

          for c in \
            "${ANDROID_SDK_ROOT:-}/cmdline-tools/latest/bin/sdkmanager" \
            "${ANDROID_SDK_ROOT:-}/cmdline-tools/bin/sdkmanager" \
            "/usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager"
          do
            if [ -n "$c" ] && [ -x "$c" ]; then SDKMANAGER="$c"; break; fi
          done
          [ -n "$SDKMANAGER" ] || SDKMANAGER="$(command -v sdkmanager || true)"
          test -n "$SDKMANAGER"
          test -x "$SDKMANAGER"

          for c in \
            "${ANDROID_SDK_ROOT:-}/cmdline-tools/latest/bin/apkanalyzer" \
            "/usr/local/lib/android/sdk/cmdline-tools/latest/bin/apkanalyzer"
          do
            if [ -x "$c" ]; then APKANALYZER="$c"; break; fi
          done
          [ -n "$APKANALYZER" ] || APKANALYZER="$(command -v apkanalyzer || true)"

          for c in \
            "${ANDROID_SDK_ROOT:-}/build-tools/34.0.0/aapt2" \
            "/usr/local/lib/android/sdk/build-tools/34.0.0/aapt2"
          do
            if [ -x "$c" ]; then AAPT2="$c"; break; fi
          done

          printf 'SDKMANAGER=%s\n' "$SDKMANAGER" | tee -a "$GITHUB_ENV"
          printf 'APKANALYZER=%s\n' "$APKANALYZER" | tee -a "$GITHUB_ENV"
          printf 'AAPT2=%s\n' "$AAPT2" | tee -a "$GITHUB_ENV"

      - name: Install required Android packages
        run: |
          set -Eeuo pipefail
          yes | "$SDKMANAGER" --licenses >/dev/null || true
          "$SDKMANAGER" --install \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: Verify source manifest contract
        run: |
          set -Eeuo pipefail
          test -f app/src/main/AndroidManifest.xml
          grep -q 'rikka.shizuku.ShizukuProvider' app/src/main/AndroidManifest.xml
          grep -q 'android:multiprocess="false"' app/src/main/AndroidManifest.xml
          grep -q 'tools:node="replace"' app/src/main/AndroidManifest.xml

      - name: Write local.properties
        run: |
          set -Eeuo pipefail
          printf 'sdk.dir=%s\n' "$ANDROID_SDK_ROOT" > local.properties

      - name: Build debug APK
        run: |
          set -Eeuo pipefail
          chmod +x ./gradlew
          ./gradlew --no-daemon :app:assembleDebug

      - name: Collect packaged APK truth
        run: |
          set -Eeuo pipefail

          APK="$(find app/build/outputs/apk -type f -name '*.apk' | sort | tail -n 1)"
          test -n "$APK"
          test -f "$APK"

          mkdir -p "$GITHUB_WORKSPACE/.hermes_artifacts/apktruth"

          sha256sum "$APK" | tee "$GITHUB_WORKSPACE/.hermes_artifacts/apktruth/apk.sha256"

          if [ -n "${AAPT2:-}" ] && [ -x "${AAPT2:-}" ]; then
            "$AAPT2" dump xmltree --file AndroidManifest.xml "$APK" \
              > "$GITHUB_WORKSPACE/.hermes_artifacts/apktruth/AndroidManifest.xmltree.txt"
          elif [ -n "${APKANALYZER:-}" ] && [ -x "${APKANALYZER:-}" ]; then
            "$APKANALYZER" manifest print "$APK" \
              > "$GITHUB_WORKSPACE/.hermes_artifacts/apktruth/AndroidManifest.print.xml"
          else
            echo "No packaged-manifest tool available" >&2
            exit 1
          fi

      - name: Packaged APK truth gate
        run: |
          set -Eeuo pipefail

          if [ -f "$GITHUB_WORKSPACE/.hermes_artifacts/apktruth/AndroidManifest.xmltree.txt" ]; then
            F="$GITHUB_WORKSPACE/.hermes_artifacts/apktruth/AndroidManifest.xmltree.txt"
            grep -q 'rikka.shizuku.ShizukuProvider' "$F"
            grep -q 'android:multiprocess.*"false"' "$F"
            ! grep -A12 -B4 'rikka.shizuku.ShizukuProvider' "$F" | grep -q 'android:multiprocess.*"true"'
          else
            F="$GITHUB_WORKSPACE/.hermes_artifacts/apktruth/AndroidManifest.print.xml"
            grep -q 'rikka.shizuku.ShizukuProvider' "$F"
            grep -q 'android:multiprocess="false"' "$F"
            ! grep -A12 -B4 'rikka.shizuku.ShizukuProvider' "$F" | grep -q 'android:multiprocess="true"'
          fi

      - name: Upload packaged APK truth
        uses: actions/upload-artifact@v6
        with:
          name: hermes-oracle-apk-truth
          path: .hermes_artifacts/apktruth/*
          if-no-files-found: error

      - name: Upload APK
        uses: actions/upload-artifact@v6
        with:
          name: hermes-oracle-debug-apk
          path: bridge/shizuku-oracle-app/app/build/outputs/apk/**/*.apk
          if-no-files-found: error
