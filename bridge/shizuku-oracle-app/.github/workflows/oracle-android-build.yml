name: oracle-android-build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .mesh/webview/oracle/shizuku-oracle-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses
        run: yes | sdkmanager --licenses || true

      - name: Install platform + build-tools
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Verify source gate
        run: |
          test -x "$HOME/bin/hermes_oracle_ci_gate_v1.sh" || chmod +x "$HOME/bin/hermes_oracle_ci_gate_v1.sh" 2>/dev/null || true
          if [ -x "$HOME/bin/hermes_oracle_ci_gate_v1.sh" ]; then
            "$HOME/bin/hermes_oracle_ci_gate_v1.sh" "$PWD"
          else
            grep -Rns --exclude-dir='.gradle' --exclude-dir='build' 'unimplemented_shizuku' . && exit 1 || true
            grep -n 'resolver":"shizuku_reflection_v1' app/src/main/java/ai/hermes/oracle/OwnerServer.kt
            grep -n 'OwnerServer(applicationContext, 17910)' app/src/main/java/ai/hermes/oracle/OracleForegroundService.kt
          fi

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace --info --no-daemon

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: oracle-debug-apk
          path: .mesh/webview/oracle/shizuku-oracle-app/app/build/outputs/apk/debug/*.apk
